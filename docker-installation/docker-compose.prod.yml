services:
  web:
    image: sougatamaity/qrator:main
    container_name: django_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GUNICORN_CMD_ARGS: "--bind 0.0.0.0:8000 --workers 2 --threads 4 --worker-class gthread --timeout 3600 --graceful-timeout 3600 --keep-alive 75 --worker-tmp-dir /dev/shm"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media  # Add media volume for file uploads
    healthcheck:
      test: ["CMD", "python", "manage.py", "check", "--deploy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "5443:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata  # Use subdir to match existing cluster layout
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C.UTF-8
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "82:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_volume:
    name: qrator_postgres_data  # Named volume for easier management
  static_volume:
    name: qrator_static_files  # Named volume for static files
  media_volume:
    name: qrator_media_files

networks:
  default:
    driver: bridge
