{% extends 'app/base.html' %}

{% block content %}
<div class="bg-white rounded-lg shadow">
    <div class="p-6 border-b border-gray-200">
        <h3 class="text-lg font-semibold text-gray-900">Settings</h3>
    </div>
    
    <div class="p-6">
        <div class="max-w-3xl">
            <!-- Profile Settings -->
            <div class="mb-8">
                <h4 class="text-lg font-medium text-gray-900 mb-4">Profile Settings</h4>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Profile Picture
                        </label>
                        <div class="flex items-center">
                            <img class="w-16 h-16 rounded-full" src="https://ui-avatars.com/api/?name={{ request.user.username }}" alt="Profile picture">
                            <button class="ml-4 px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                                Change
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Full Name
                        </label>
                        <input type="text" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" value="{{ request.user.get_full_name }}">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Email Address
                        </label>
                        <input type="email" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" value="{{ request.user.email }}">
                    </div>
                </div>
            </div>

            <!-- Notification Settings -->
            <div class="mb-8">
                <h4 class="text-lg font-medium text-gray-900 mb-4">Notification Settings</h4>
                <div class="space-y-4">
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input type="checkbox" class="focus:ring-blue-500 h-4 w-4 text-blue-600 border-gray-300 rounded" checked>
                        </div>
                        <div class="ml-3">
                            <label class="text-sm font-medium text-gray-700">Email Notifications</label>
                            <p class="text-sm text-gray-500">Receive email updates about your account activity</p>
                        </div>
                    </div>
                    
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input type="checkbox" class="focus:ring-blue-500 h-4 w-4 text-blue-600 border-gray-300 rounded" checked>
                        </div>
                        <div class="ml-3">
                            <label class="text-sm font-medium text-gray-700">Push Notifications</label>
                            <p class="text-sm text-gray-500">Receive push notifications in your browser</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Security Settings -->
            <div class="mb-8">
                <h4 class="text-lg font-medium text-gray-900 mb-4">Security Settings</h4>
                <div class="space-y-4">
                    <button class="w-full flex justify-between items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                        <span>Change Password</span>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                    
                    <button class="w-full flex justify-between items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                        <span>Two-Factor Authentication</span>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Save Button -->
            <div class="flex justify-end">
                <button class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
                    Save Changes
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
